<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouBike Demand Forecast Deck</title>
    <script src="https://unpkg.com/deck.gl@8.9.23/dist.min.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css"
      rel="stylesheet"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
        background-color: #0b1d2c;
        color: #fff;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
      #control-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.6);
        padding: 16px;
        border-radius: 8px;
        max-width: 320px;
      }
      label,
      select {
        display: block;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="control-panel">
      <h2>YouBike Forecast Layers</h2>
      <label for="horizon-select">Forecast Horizon</label>
      <select id="horizon-select">
        <option value="t15">T+15</option>
        <option value="t30">T+30</option>
        <option value="t60">T+60</option>
      </select>
      <p id="layer-summary"></p>
    </div>
    <script src="layers.js"></script>
  </body>
</html>
